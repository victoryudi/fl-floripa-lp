<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição Concluída - Logosofia</title>
    <link rel="stylesheet" href="styles.css?v=1.3">
    <style>
        .thank-you-section {
            position: relative;
            min-height: 100vh;
            background-color: #12326E;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .thank-you-content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
            width: 100%;
            max-width: 700px;
        }

        .thank-you-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 3rem;
            background: linear-gradient(135deg, #E25100 0%, #ff6b1a 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 40px rgba(226, 81, 0, 0.3);
            animation: checkmark-pop 0.6s ease-out;
        }

        @keyframes checkmark-pop {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .thank-you-icon svg {
            width: 60px;
            height: 60px;
            color: white;
            stroke-width: 3;
            animation: checkmark-draw 0.8s ease-out 0.3s;
            animation-fill-mode: both;
        }

        @keyframes checkmark-draw {
            0% {
                stroke-dasharray: 0 100;
            }
            100% {
                stroke-dasharray: 100 100;
            }
        }

        .thank-you-title {
            font-size: 3rem;
            color: white;
            font-weight: 500;
            line-height: 1.2;
            margin-bottom: 2.5rem;
            letter-spacing: -0.02em;
        }

        .thank-you-message {
            font-size: 1.375rem;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 300;
            line-height: 1.6;
            margin-bottom: 3rem;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .thank-you-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3rem;
            margin-top: 3rem;
            flex-wrap: wrap;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
        }

        .info-item svg {
            width: 24px;
            height: 24px;
            opacity: 0.8;
        }

        .divider {
            width: 60px;
            height: 3px;
            background-color: #E25100;
            margin: 0 auto 2.5rem;
            border-radius: 2px;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            .thank-you-content {
                padding: 2rem 1.5rem;
            }

            .thank-you-icon {
                width: 100px;
                height: 100px;
                margin-bottom: 2.5rem;
            }

            .thank-you-icon svg {
                width: 50px;
                height: 50px;
            }

            .thank-you-title {
                font-size: 2rem;
                margin-bottom: 2rem;
            }

            .thank-you-message {
                font-size: 1.125rem;
                margin-bottom: 2rem;
            }

            .thank-you-info {
                gap: 2rem;
                margin-top: 2rem;
            }

            .info-item {
                font-size: 0.875rem;
            }

            .divider {
                width: 50px;
                margin-bottom: 2rem;
            }
        }
    </style>
</head>
<body>
    <section class="thank-you-section">
        <div class="sun-element"></div>
        <img src="resources/logo.png" alt="Logosofia" class="logo">
        <div class="thank-you-content">
            <div class="thank-you-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 6L9 17l-5-5" stroke-dasharray="100" stroke-dashoffset="0"/>
                </svg>
            </div>
            <h1 class="thank-you-title">Inscrição concluída com sucesso!</h1>
            <div class="divider"></div>
            <p class="thank-you-message">
                Em breve você receberá o convite via email e WhatsApp com todas as informações necessárias para participar.
            </p>
        </div>
    </section>
</body>
</html>
