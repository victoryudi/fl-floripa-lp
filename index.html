        rel="stylesheet">
    <style>
        :root {
            --brand-blue: #12326e;
            --brand-blue-soft: #596f99;
            --brand-blue-muted: #677ba1;
            --brand-orange: #e25100;
            --brand-orange-bright: #ff6a1f;
            --brand-sun: #ffb900;
            --surface: #fffdfb;
            --surface-soft: #f8f8f8;
            --surface-card: #ffffff;
            --line: #dfe6ee;
            --line-strong: #c8d0dc;
            --shadow-soft: 0 22px 50px rgba(18, 50, 110, 0.08);
            --shadow-card: 0 18px 38px rgba(18, 50, 110, 0.08);
            --shadow-modal: 0 34px 84px rgba(18, 50, 110, 0.18);
            --radius-pill: 30px;
            --radius-xl: 28px;
            --radius-lg: 22px;
            --radius-md: 18px;
            --ease: cubic-bezier(0.22, 1, 0.36, 1);
            --page-gutter: clamp(1rem, 1vw + 0.8rem, 2rem);
            --content-max: 1320px;
            --hero-progress: 0;
        }

        * {
            box-sizing: border-box;
        }

        html {
            margin: 0;
            padding: 0;
            font-size: 16px;
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: var(--surface);
        }

        body {
            margin: 0;
            font-family: "Source Sans Pro", sans-serif;
            color: var(--brand-blue);
            background: var(--surface);
            overflow-x: hidden;
        }

        body.modal-open {
            overflow: hidden;
        }

        img,
        video,
        iframe,
        svg {
            display: block;
            max-width: 100%;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button,
        input {
            font: inherit;
        }

        button {
            border: 0;
            background: none;
            padding: 0;
            cursor: pointer;
        }

        .site-header {
            position: sticky;
            top: 0;
            z-index: 30;
            background: rgba(255, 253, 251, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 4px solid var(--brand-blue);
            border-bottom: 1px solid rgba(18, 50, 110, 0.08);
            overflow: visible;
        }

        .site-header::before {
            content: none;
        }

        .site-header-inner,
        .section-inner,
        .footer-inner,
        .hero-inner {
            width: min(100%, var(--content-max));
            margin: 0 auto;
        }

        .site-header-inner {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            min-height: 5.4rem;
            padding: 0 var(--page-gutter);
        }

        .site-brand img {
            width: clamp(7.6rem, 9vw, 8.8rem);
            height: auto;
            filter: brightness(0) saturate(100%) invert(15%) sepia(55%) saturate(1677%) hue-rotate(197deg) brightness(93%) contrast(93%);
        }

        .page-shell {
            position: relative;
        }

        .page-shell::before {
            content: "";
            position: absolute;
            top: -2rem;
            left: -3.9rem;
            width: 30.5rem;
            height: 30.5rem;
            background: url("resources/sol-symbol.png") center/cover no-repeat;
            opacity: 1;
            pointer-events: none;
            z-index: 0;
        }

        .page-shell>main,
        .page-shell>footer {
            position: relative;
            z-index: 1;
        }

        .hero {
            position: relative;
            padding: 0.9rem var(--page-gutter) clamp(3rem, 4vw, 4rem);
            overflow: clip;
        }

        .hero::before {
            content: "";
            position: absolute;
            inset: auto auto 1rem clamp(-5rem, -3vw, -1rem);
            width: clamp(8rem, 12vw, 11rem);
            height: clamp(8rem, 12vw, 11rem);
            background: radial-gradient(circle, rgba(255, 185, 0, 0.32) 0%, rgba(255, 185, 0, 0.08) 44%, transparent 74%);
            filter: blur(10px);
            opacity: calc(1 - (var(--hero-progress) * 0.25));
            pointer-events: none;
        }

        .hero::after {
            content: "";
            position: absolute;
            inset: clamp(1.5rem, 4vw, 3rem) -14rem auto auto;
            width: clamp(16rem, 26vw, 22rem);
            height: clamp(16rem, 26vw, 22rem);
            background: radial-gradient(circle, rgba(18, 50, 110, 0.08) 0%, transparent 68%);
            filter: blur(10px);
            pointer-events: none;
        }

        .hero-inner {
            position: relative;
            display: grid;
            justify-items: start;
            align-content: start;
            max-width: 1060px;
            gap: clamp(0.5rem, 0.9vw, 0.75rem);
        }

        .hero-media,
        .hero-copy,
        .hero-actions {
            opacity: 0;
            transform: translate3d(0, 2rem, 0);
            animation: rise-in 0.9s var(--ease) forwards;
        }

        .hero-media {
            animation-delay: 0.08s;
        }

        .hero-copy {
            animation-delay: 0.22s;
        }

        .hero-actions {
            animation-delay: 0.34s;
        }

        @keyframes rise-in {
            to {
                opacity: 1;
                transform: translate3d(0, 0, 0);
            }
        }

        .hero-media {
            position: relative;
            width: min(100%, 980px);
            margin-left: 0;
        }

        .hero-video-frame {
            position: relative;
            overflow: hidden;
            border-radius: 14px;
            background: var(--surface-card);
            border: 1px solid rgba(18, 50, 110, 0.08);
            box-shadow: var(--shadow-soft);
        }

        .hero-video-frame::before {
            content: "";
            position: absolute;
            inset: 0;
            border-top: 1px solid rgba(255, 255, 255, 0.74);
            pointer-events: none;
        }

        .video-shell {
            position: relative;
            aspect-ratio: 16 / 9;
            background: linear-gradient(180deg, #0f264f 0%, #102958 100%);
            overflow: hidden;
        }

        .video-shell video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: linear-gradient(180deg, #0f264f 0%, #102958 100%);
        }

        .video-logo {
            position: absolute;
            right: 1rem;
            bottom: 1rem;
            width: clamp(4.5rem, 8vw, 6.5rem);
            opacity: 0.88;
        }

        .hero-copy {
            position: relative;
            z-index: 1;
            width: min(100%, 54rem);
            max-width: none;
            padding-left: 0;
            margin-top: 0.6rem;
        }

        .hero-title {
            margin: 0;
            padding-bottom: 5px;
            font-size: clamp(2.75rem, 4.4vw, 4.65rem);
            line-height: 1.05;
            letter-spacing: -0.045em;
            font-weight: 900;
            color: var(--brand-blue);
        }

        .hero-actions {
            display: flex;
            align-items: center;
            gap: 0.9rem;
            position: relative;
            margin-top: 0.1rem;
            width: min(100%, 980px);
        }

        .hero-actions .cta-button {
            width: 100%;
        }

        .hero-actions::before {
            content: "";
            position: absolute;
            left: 0.55rem;
            top: 50%;
            width: 6rem;
            height: 2.7rem;
            border-radius: 999px;
            background: radial-gradient(circle, rgba(255, 185, 0, 0.28) 0%, rgba(255, 185, 0, 0.06) 56%, transparent 72%);
            transform: translateY(-50%);
            filter: blur(8px);
            pointer-events: none;
        }

        .cta-button,
        .form-submit {
            position: relative;
            z-index: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 3rem;
            padding: 0.85rem 1.55rem;
            border-radius: var(--radius-pill);
            background: var(--brand-orange);
            color: #fff;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.01em;
            box-shadow: 0 14px 24px rgba(226, 81, 0, 0.16);
            transition:
                transform 0.28s var(--ease),
                background-color 0.28s var(--ease),
                color 0.28s var(--ease),
                box-shadow 0.28s var(--ease);
            animation: cta-breathe 2.8s ease-in-out infinite;
        }

        @keyframes cta-breathe {

            0%,
            100% {
                box-shadow: 0 14px 24px rgba(226, 81, 0, 0.16);
            }

            50% {
                box-shadow: 0 18px 30px rgba(226, 81, 0, 0.24);
            }
        }

        .cta-button:hover,
        .cta-button:focus-visible,
        .form-submit:hover,
        .form-submit:focus-visible {
            transform: translate3d(0, -2px, 0);
            background: var(--brand-orange-bright);
            color: var(--brand-blue);
            box-shadow: 0 18px 32px rgba(226, 81, 0, 0.2);
        }

        .cta-button:focus-visible,
        .control-button:focus-visible,
        .social-link:focus-visible,
        .form-close:focus-visible,
        .field input:focus-visible,
        .form-submit:focus-visible {
            outline: 2px solid rgba(18, 50, 110, 0.22);
            outline-offset: 3px;
        }

        .section {
            position: relative;
            padding: clamp(3.5rem, 5vw, 4.8rem) var(--page-gutter);
            content-visibility: auto;
            contain-intrinsic-size: 900px;
        }

        .testimonials {
            background: var(--surface);
        }

        .section-head {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 1rem;
            align-items: end;
            margin-bottom: 1.8rem;
        }

        .testimonials-title {
            margin: 0;
            max-width: 40rem;
            font-size: clamp(2.2rem, 4.4vw, 3.6rem);
            line-height: 0.95;
            letter-spacing: -0.045em;
            font-weight: 900;
            text-wrap: balance;
            background: linear-gradient(90deg, #ff5500 0%, #ffb900 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            padding-bottom: 5px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 0.65rem;
        }

        .control-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 2.55rem;
            height: 2.55rem;
            border-radius: 50%;
            background: #e7e9ed;
            color: var(--brand-blue-muted);
            transition:
                transform 0.24s var(--ease),
                background-color 0.24s var(--ease),
                color 0.24s var(--ease),
                opacity 0.24s ease;
        }

        .control-button:hover,
        .control-button:focus-visible {
            transform: translate3d(0, -1px, 0);
            background: #dfe4ea;
            color: #000;
        }

        .control-button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }

        .control-button svg {
            width: 1rem;
            height: 1rem;
        }

        .carousel-shell {
            position: relative;
        }

        .carousel-viewport {
            overflow-x: auto;
            overflow-y: visible;
            padding-bottom: 0.85rem;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .carousel-viewport::-webkit-scrollbar {
            display: none;
        }

        .carousel-track {
            display: flex;
            gap: 1.2rem;
            align-items: stretch;
        }

        .story {
            flex: 0 0 calc((100% - 2.4rem) / 3);
            min-width: 17rem;
            list-style: none;
            scroll-snap-align: start;
            opacity: 0.78;
            transform: translate3d(0, 1rem, 0);
            transition:
                transform 0.35s var(--ease),
                opacity 0.35s var(--ease),
                filter 0.35s var(--ease);
        }

        .story.is-visible {
            opacity: 1;
            transform: translate3d(0, 0, 0);
        }

        .story.is-active {
            transform: translate3d(0, -0.3rem, 0);
            opacity: 1;
        }

        .story-shell {
            height: 100%;
            padding: 0.75rem;
            border-radius: var(--radius-xl);
            background: var(--surface-card);
            border: 1px solid rgba(18, 50, 110, 0.08);
            box-shadow: var(--shadow-card);
            transition:
                transform 0.3s var(--ease),
                box-shadow 0.3s var(--ease);
        }

        .story:hover .story-shell,
        .story:focus-within .story-shell,
        .story.is-active .story-shell {
            transform: translate3d(0, -0.2rem, 0);
            box-shadow: 0 22px 40px rgba(18, 50, 110, 0.1);
        }

        .story-media {
            position: relative;
            aspect-ratio: 9 / 16;
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: linear-gradient(180deg, #f0f3f7 0%, #dfe6ee 100%);
        }

        .story-media::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 28% 12%, rgba(255, 185, 0, 0.18) 0%, transparent 28%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0));
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .story.is-loaded .story-media::before {
            opacity: 0;
        }

        .story iframe {
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .story.is-loaded iframe {
            opacity: 1;
        }

        .carousel-progress {
            position: relative;
            width: min(100%, 22rem);
            height: 2px;
            margin: 0.55rem 0 0 auto;
            border-radius: 999px;
            background: rgba(18, 50, 110, 0.12);
            overflow: hidden;
        }

        .carousel-progress span {
            display: block;
            width: 100%;
            height: 100%;
            transform-origin: left center;
            transform: scaleX(0.28);
            background: linear-gradient(90deg, var(--brand-blue) 0%, var(--brand-orange-bright) 100%);
        }

        .footer {
            margin-top: 0.5rem;
            background: var(--surface-soft);
            border-top: 1px solid var(--line);
            padding: clamp(3rem, 5vw, 4rem) var(--page-gutter);
        }

        .footer-inner {
            display: grid;
            gap: 1.5rem;
            justify-items: center;
        }

        .footer-brand img {
            width: clamp(7.6rem, 9vw, 8.8rem);
            height: auto;
            filter: brightness(0) saturate(100%) invert(15%) sepia(55%) saturate(1677%) hue-rotate(197deg) brightness(93%) contrast(93%);
        }

        .footer-social {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.85rem;
        }

        .social-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 2.9rem;
            height: 2.9rem;
            border-radius: 50%;
            background: #fff;
            color: var(--brand-blue);
            border: 1px solid rgba(18, 50, 110, 0.12);
            transition:
                transform 0.24s var(--ease),
                background-color 0.24s var(--ease),
                color 0.24s var(--ease),
                border-color 0.24s var(--ease);
        }

        .social-link:hover,
        .social-link:focus-visible {
            transform: translate3d(0, -2px, 0);
            background: var(--brand-blue);
            color: #fff;
            border-color: var(--brand-blue);
        }

        .social-link svg {
            width: 1.15rem;
            height: 1.15rem;
        }

        .form-overlay {
            position: fixed;
            inset: 0;
            z-index: 40;
            display: grid;
            place-items: center;
            padding: 1rem;
            background: rgba(18, 50, 110, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.28s var(--ease), visibility 0.28s ease;
        }

        .form-overlay.is-active {
            opacity: 1;
            visibility: visible;
        }

        .form-dialog {
            position: relative;
            width: min(100%, 38rem);
            overflow: hidden;
            border-radius: var(--radius-xl);
            background: var(--surface-card);
            color: var(--brand-blue);
            border: 1px solid rgba(18, 50, 110, 0.1);
            box-shadow: var(--shadow-modal);
            transform: translate3d(0, 1.5rem, 0) scale(0.98);
            transition: transform 0.32s var(--ease);
        }

        .form-overlay.is-active .form-dialog {
            transform: translate3d(0, 0, 0) scale(1);
        }

        .form-dialog::before {
            content: "";
            position: absolute;
            top: -5rem;
            right: -4rem;
            width: 15rem;
            height: 15rem;
            background: url("resources/sol-symbol.png") center/cover no-repeat;
            opacity: 0.2;
            filter: blur(6px);
            pointer-events: none;
        }

        .form-content {
            position: relative;
            z-index: 1;
            padding: clamp(1.6rem, 4vw, 2.2rem);
        }

        .form-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            z-index: 2;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            background: #f3f5f8;
            color: var(--brand-blue);
            transition:
                transform 0.24s var(--ease),
                background-color 0.24s var(--ease);
        }

        .form-close:hover,
        .form-close:focus-visible {
            transform: rotate(90deg);
            background: #e7ebf0;
        }

        .form-close svg {
            width: 1rem;
            height: 1rem;
        }

        .form-title {
            margin: 0 0 1.5rem;
            max-width: 30rem;
            color: var(--brand-blue);
            font-size: clamp(2rem, 4vw, 2.7rem);
            line-height: 0.95;
            letter-spacing: -0.04em;
            font-weight: 900;
            text-wrap: balance;
        }

        .field {
            margin-bottom: 1rem;
        }

        .field label {
            display: block;
            margin-bottom: 0.45rem;
            color: var(--brand-blue);
            font-size: 0.95rem;
            font-weight: 700;
        }

        .field input {
            width: 100%;
            height: 3.3rem;
            padding: 0 1rem;
            border-radius: var(--radius-pill);
            border: 1px solid var(--line-strong);
            background: #fff;
            color: var(--brand-blue);
            transition:
                border-color 0.24s ease,
                box-shadow 0.24s ease,
                transform 0.24s ease;
        }

        .field input::placeholder {
            color: rgba(89, 111, 153, 0.65);
        }

        .field input:focus {
            border-color: var(--brand-blue-soft);
            box-shadow: 0 0 0 4px rgba(18, 50, 110, 0.08);
            transform: translate3d(0, -1px, 0);
        }

        .form-note {
            margin: 1.35rem 0 1.3rem;
            padding: 0.95rem 1rem;
            border-radius: 1.25rem;
            border: 1px solid var(--line);
            background: #fff;
            color: var(--brand-blue-muted);
            font-size: 0.95rem;
            line-height: 1.45;
        }

        .form-submit {
            width: 100%;
        }

        .reveal {
            opacity: 0;
            transform: translate3d(0, 1.75rem, 0);
            transition:
                opacity 0.75s var(--ease),
                transform 0.75s var(--ease);
            transition-delay: var(--delay, 0ms);
        }

        .reveal.is-visible {
            opacity: 1;
            transform: translate3d(0, 0, 0);
        }

        @media (min-width: 900px) {
            .hero-inner {
                padding-left: clamp(2rem, 6vw, 6.75rem);
            }

            .hero-title {
                white-space: nowrap;
            }
        }

        @media (max-width: 980px) {
            .section-head {
                grid-template-columns: 1fr;
                align-items: start;
            }

            .controls {
                justify-content: flex-start;
            }

            .story {
                flex-basis: calc((100% - 1.2rem) / 2);
            }
        }

        @media (max-width: 767px) {
            html {
                scroll-behavior: auto;
            }

            .site-header-inner {
                min-height: 4.6rem;
            }

            .site-header::before {
                content: none;
            }

            .hero {
                padding-top: 0.55rem;
                padding-bottom: 3rem;
                min-height: auto;
            }

            .page-shell::before {
                top: -2.5rem;
                left: -4.5rem;
                width: 24rem;
                height: 24rem;
            }

            .hero-media {
                margin-top: -70px;
            }

            .hero-media-glow {
                width: 6.4rem;
                height: 6.4rem;
                left: -0.8rem;
                bottom: 12%;
            }

            .hero-copy {
                padding-left: 0;
                margin-top: 30px;
            }

            .hero-copy::before {
                margin-bottom: 0.65rem;
            }

            .hero-title {
                font-size: clamp(2.15rem, 9.6vw, 2.95rem);
                white-space: normal;
                line-height: 0.98;
            }

            .hero-inner {
                gap: 0.22rem;
            }

            .video-shell video {
                position: absolute;
                inset: 0;
            }

            .video-logo {
                right: 0.75rem;
                bottom: 0.75rem;
                width: 4.8rem;
            }

            .section {
                padding-top: 3rem;
                padding-bottom: 3rem;
            }

            .testimonials-title {
                font-size: clamp(2rem, 10vw, 2.7rem);
            }

            .story {
                flex-basis: min(84vw, 19rem);
            }

            .story-shell {
                padding: 0.6rem;
                border-radius: 1.4rem;
            }

            .story-media {
                border-radius: 1rem;

    <script>
        (function () {
            "use strict";

            var prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
            var hero = document.querySelector(".hero");
            var video = document.getElementById("vslVideo");

            // Autoplay fallback: browsers require muted for autoplay.
            // Attempt unmuted playback, fall back to muted if blocked.
            if (video) {
                var playPromise = video.play();
                if (playPromise !== undefined) {
                    playPromise.catch(function () {
                        video.muted = true;
                        video.play();
                    });
                }
            }

            var viewport = document.querySelector("[data-carousel-viewport]");
            var stories = Array.prototype.slice.call(document.querySelectorAll("[data-story]"));
            var prevButton = document.querySelector("[data-carousel-prev]");
            var nextButton = document.querySelector("[data-carousel-next]");
            var progressBar = document.querySelector("[data-carousel-progress]");
            var modalOverlay = document.getElementById("formOverlay");
            var ctaButton = document.getElementById("ctaButton");
            var formClose = document.getElementById("formClose");
            var registrationForm = document.getElementById("registrationForm");
            var whatsappInput = document.getElementById("whatsapp");
            var lastFocusedElement = null;
            var resizeTimer = 0;

            function revealImmediately() {
                document.querySelectorAll(".reveal").forEach(function (element) {
                    element.classList.add("is-visible");
                });
                stories.forEach(function (story) {
                    story.classList.add("is-visible");
                });
            }

            if (prefersReducedMotion || !("IntersectionObserver" in window)) {
                revealImmediately();
            } else {
                var revealObserver = new IntersectionObserver(function (entries, observer) {
                    entries.forEach(function (entry) {
                        if (entry.isIntersecting) {
                            entry.target.classList.add("is-visible");
                            observer.unobserve(entry.target);
                        }
                    });
                }, {
                    threshold: 0.16,
                    rootMargin: "0px 0px -40px 0px"
                });

                document.querySelectorAll(".reveal").forEach(function (element) {
                    revealObserver.observe(element);
                });
            }

            if (video) {
                video.addEventListener("loadedmetadata", function () {
                    video.currentTime = 193;
                });

                video.addEventListener("play", function () {
                    if (Math.round(video.currentTime) === 193 && !video.hasAttribute("data-played")) {
                        video.currentTime = 0;
                        video.setAttribute("data-played", "true");
                    }
                });
            }

            function updateHeroMotion() {
                if (!hero || prefersReducedMotion) {
                    return;
                }

                var rect = hero.getBoundingClientRect();
                var distance = Math.max(0, -rect.top);
                var progress = Math.min(distance / Math.max(rect.height * 0.9, 1), 1);
                hero.style.setProperty("--hero-progress", progress.toFixed(4));
            }

            if (hero && !prefersReducedMotion) {
                updateHeroMotion();

                var heroTicking = false;

                var requestHeroUpdate = function () {
                    if (heroTicking) {
                        return;
                    }

                    heroTicking = true;
                    window.requestAnimationFrame(function () {
                        updateHeroMotion();
                        heroTicking = false;
                    });
                };

                window.addEventListener("scroll", requestHeroUpdate, { passive: true });
                window.addEventListener("resize", requestHeroUpdate);
            }

            function markActiveStory() {
                if (!viewport || !stories.length) {
                    return;
                }

                var viewportCenter = viewport.scrollLeft + (viewport.clientWidth / 2);
                var closestIndex = 0;
                var closestDistance = Infinity;

                stories.forEach(function (story, index) {
                    var center = story.offsetLeft + (story.offsetWidth / 2);
                    var distance = Math.abs(center - viewportCenter);

                    if (distance < closestDistance) {
                        closestDistance = distance;
                        closestIndex = index;
                    }
                });

                stories.forEach(function (story, index) {
                    story.classList.toggle("is-active", index === closestIndex);
                });
            }

            function updateCarouselControls() {
                if (!viewport || !stories.length) {
                    return;
                }

                var maxScroll = Math.max(viewport.scrollWidth - viewport.clientWidth, 0);
                var scrollLeft = viewport.scrollLeft;
                var ratio = maxScroll > 0 ? (scrollLeft + viewport.clientWidth) / viewport.scrollWidth : 1;

                if (prevButton) {
                    prevButton.disabled = scrollLeft <= 4;
                }

                if (nextButton) {
                    nextButton.disabled = scrollLeft >= maxScroll - 4;
                }

                if (progressBar) {
                    progressBar.style.transform = "scaleX(" + Math.max(0.18, Math.min(ratio, 1)).toFixed(4) + ")";
                }

                markActiveStory();
            }

            function getScrollStep() {
                if (!stories.length) {
                    return viewport ? viewport.clientWidth : 0;
                }

                if (stories.length > 1) {
                    return stories[1].offsetLeft - stories[0].offsetLeft;
                }

                return stories[0].offsetWidth;
            }

            function scrollCarousel(direction) {
                if (!viewport) {
                    return;
                }

                viewport.scrollBy({
                    left: direction * getScrollStep(),
                    behavior: prefersReducedMotion ? "auto" : "smooth"
                });
            }

            if (viewport) {
                updateCarouselControls();

                viewport.addEventListener("scroll", function () {
                    updateCarouselControls();
                }, { passive: true });
            }

            if (prevButton) {
                prevButton.addEventListener("click", function () {
                    scrollCarousel(-1);
                });
            }

            if (nextButton) {
                nextButton.addEventListener("click", function () {
                    scrollCarousel(1);
                });
            }

            function loadStory(story) {
                var iframe = story.querySelector("iframe[data-src]");

                if (iframe) {
                    iframe.src = iframe.getAttribute("data-src");
                    iframe.removeAttribute("data-src");
                    iframe.addEventListener("load", function () {
                        story.classList.add("is-loaded");
                        story.classList.add("is-visible");
                    }, { once: true });
                } else {
                    story.classList.add("is-loaded");
                    story.classList.add("is-visible");
                }
            }

            var eagerCount = window.innerWidth <= 980 ? 2 : 3;
            stories.slice(0, eagerCount).forEach(function (story) {
                loadStory(story);
            });

            if ("IntersectionObserver" in window && viewport) {
                var iframeObserver = new IntersectionObserver(function (entries, observer) {
                    entries.forEach(function (entry) {
                        if (!entry.isIntersecting) {
                            return;
                        }

                        var story = entry.target;
                        loadStory(story);

                        observer.unobserve(story);
                    });
                }, {
                    root: viewport,
                    rootMargin: "0px 220px 0px 220px",
                    threshold: 0.2
                });

                stories.forEach(function (story) {
                    iframeObserver.observe(story);
                });
            } else {
                stories.forEach(function (story) {
                    loadStory(story);
                });
            }

            function getFocusableElements() {
                if (!modalOverlay) {
                    return [];
                }

                return Array.prototype.slice.call(
                    modalOverlay.querySelectorAll('button:not([disabled]), input:not([disabled]), a[href], [tabindex]:not([tabindex="-1"])')
                ).filter(function (element) {
                    return element.offsetParent !== null;
                });
            }

            function openModal() {
                if (!modalOverlay) {
                    return;
                }

                lastFocusedElement = document.activeElement;
                modalOverlay.classList.add("is-active");
                modalOverlay.setAttribute("aria-hidden", "false");
                document.body.classList.add("modal-open");

                window.setTimeout(function () {
                    var firstInput = document.getElementById("fullname");
                    if (firstInput) {
                        firstInput.focus();
                    }
                }, prefersReducedMotion ? 0 : 100);
            }

            function closeModal() {
                if (!modalOverlay) {
                    return;
                }

                modalOverlay.classList.remove("is-active");
                modalOverlay.setAttribute("aria-hidden", "true");
                document.body.classList.remove("modal-open");

                if (lastFocusedElement && typeof lastFocusedElement.focus === "function") {
                    lastFocusedElement.focus();
                }
            }

            if (ctaButton) {
                ctaButton.addEventListener("click", openModal);
            }

            if (formClose) {
                formClose.addEventListener("click", closeModal);
            }

            if (modalOverlay) {
                modalOverlay.addEventListener("click", function (event) {
                    if (event.target === modalOverlay) {
                        closeModal();
                    }
                });
            }

            document.addEventListener("keydown", function (event) {
                if (!modalOverlay || !modalOverlay.classList.contains("is-active")) {
                    return;
                }

                if (event.key === "Escape") {
                    closeModal();
                    return;
                }

                if (event.key !== "Tab") {
                    return;
                }

                var focusableElements = getFocusableElements();
                if (!focusableElements.length) {
                    return;
                }

                var first = focusableElements[0];
                var last = focusableElements[focusableElements.length - 1];

                if (event.shiftKey && document.activeElement === first) {
                    event.preventDefault();
                    last.focus();
                } else if (!event.shiftKey && document.activeElement === last) {
                    event.preventDefault();
                    first.focus();
                }
            });

            if (registrationForm) {
                registrationForm.addEventListener("submit", function (event) {
                    event.preventDefault();

                    var formData = {
                        fullname: document.getElementById("fullname").value,
                        email: document.getElementById("email").value,
                        whatsapp: document.getElementById("whatsapp").value
                    };

                    var eventId = 'lead_' + Date.now() + '_' + Math.random().toString(36).slice(2, 9);

                    if (typeof fbq === 'function') {
                        fbq('track', 'Lead', {
                            content_name: 'Inscrição Logosofia Florianópolis',
                            content_category: 'Landing Page',
                            value: 0,
                            currency: 'BRL'
                        }, { eventID: eventId });
                    }

                    console.log("Form submitted:", formData);
                    alert("Inscrição realizada com sucesso! Você receberá o convite em breve.");
                    registrationForm.reset();
                    closeModal();
                });
            }

            if (whatsappInput) {
                whatsappInput.addEventListener("input", function (event) {
                    var value = event.target.value.replace(/\D/g, "").slice(0, 11);

                    if (value.length > 6) {
                        value = "(" + value.slice(0, 2) + ") " + value.slice(2, 7) + "-" + value.slice(7);
                    } else if (value.length > 2) {
                        value = "(" + value.slice(0, 2) + ") " + value.slice(2);
                    } else if (value.length > 0) {
                        value = "(" + value;
                    }

                    event.target.value = value;
                });
            }

            window.addEventListener("resize", function () {
                window.clearTimeout(resizeTimer);
                resizeTimer = window.setTimeout(function () {
                    updateCarouselControls();
                    updateHeroMotion();
                }, 120);
            });
        })();
    </script>
