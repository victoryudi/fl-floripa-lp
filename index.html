    <!-- Popup Form -->
    <div class="form-overlay" id="formOverlay">
        <div class="form-container">
            <button class="form-close" id="formClose" aria-label="Fechar formulário">&times;</button>
            <h2 class="form-title">Para realizar sua inscrição e receber o convite, preencha os campos abaixo.</h2>
            
            <form id="registrationForm">
                <div class="form-group">
                    <label for="fullname">Nome completo</label>
                    <input type="text" id="fullname" name="fullname" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="whatsapp">WhatsApp</label>
                    <input type="tel" id="whatsapp" name="whatsapp" placeholder="(XX) XXXXX-XXXX" required>
                </div>
                
                <p class="form-note">Não se preocupe, seus dados serão guardados de forma segura e serão utilizados exclusivamente para envio do convite</p>
                
                <button type="submit" class="form-submit">Enviar inscrição</button>
            </form>
        </div>
    </div>
    
    <script src="script.js"></script>
